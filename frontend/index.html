<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAM Policy Analyzer — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">

  <div class="login-wrapper">
    <div class="login-brand">
      <h1 class="login-title">IAM Policy Analyzer</h1>
      <p class="login-sub">Detect dangerous permissions. Enforce least privilege.</p>
    </div>

    <div class="login-card">
      <!-- Tabs -->
      <div class="modal-tabs" id="auth-tabs">
        <button class="modal-tab active" id="tab-login"    type="button">Login</button>
        <button class="modal-tab"        id="tab-register" type="button">Register</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" required autocomplete="email" />
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="Password" required autocomplete="current-password" />
        <div class="auth-error" id="login-error" style="display:none"></div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Login</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form" style="display:none">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" placeholder="you@example.com" required autocomplete="email" />
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password" />
        <div class="auth-error" id="reg-error" style="display:none"></div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Create Account</button>
      </form>
    </div>

    <!-- Force Password Change (shown inline after first login) -->
    <div class="login-card" id="force-pw-card" style="display:none;margin-top:16px">
      <div class="modal-tabs">
        <button class="modal-tab active" type="button">Change Password Required</button>
      </div>
      <p style="font-size:13px;color:var(--color-muted);margin:0 0 16px">
        First login — set a new password to continue.
      </p>
      <form id="force-pw-form" class="auth-form">
        <label for="force-pw-current">Current Password</label>
        <input id="force-pw-current" type="password" placeholder="Current password" required />
        <label for="force-pw-new">New Password</label>
        <input id="force-pw-new" type="password" placeholder="Min 8 chars, 1 uppercase, 1 digit" required minlength="8" />
        <label for="force-pw-confirm">Confirm New Password</label>
        <input id="force-pw-confirm" type="password" placeholder="Repeat new password" required minlength="8" />
        <div class="auth-error" id="force-pw-error" style="display:none"></div>
        <button type="submit" class="btn-primary" style="width:100%;margin-top:8px">Set New Password</button>
      </form>
    </div>

  </div>

  <script src="shared.js"></script>
  <script>
    // Already logged in → skip to app
    if (isLoggedIn()) window.location.replace("analyze.html");

    // ── tab switching ────────────────────────────────────────────────────────
    const loginForm    = document.getElementById("login-form");
    const registerForm = document.getElementById("register-form");
    const forcePwCard  = document.getElementById("force-pw-card");

    document.getElementById("tab-login").addEventListener("click", () => {
      loginForm.style.display    = "";
      registerForm.style.display = "none";
      document.getElementById("tab-login").classList.add("active");
      document.getElementById("tab-register").classList.remove("active");
    });
    document.getElementById("tab-register").addEventListener("click", () => {
      loginForm.style.display    = "none";
      registerForm.style.display = "";
      document.getElementById("tab-register").classList.add("active");
      document.getElementById("tab-login").classList.remove("active");
    });

    // ── helpers ──────────────────────────────────────────────────────────────
    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = "";
    }
    function hideError(id) {
      document.getElementById(id).style.display = "none";
    }

    // ── login ────────────────────────────────────────────────────────────────
    loginForm.addEventListener("submit", async e => {
      e.preventDefault();
      hideError("login-error");
      const email    = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      try {
        const resp = await fetch("/api/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await resp.json();
        if (!resp.ok) { showError("login-error", data.detail || "Login failed"); return; }
        setToken(data.access_token);
        if (data.refresh_token) setRefreshToken(data.refresh_token);
        if (data.must_change_password) {
          document.querySelector(".login-card").style.display = "none";
          forcePwCard.style.display = "";
          document.getElementById("force-pw-current").value = password;
        } else {
          window.location.href = "analyze.html";
        }
      } catch {
        showError("login-error", "Network error — is the server running?");
      }
    });

    // ── register ─────────────────────────────────────────────────────────────
    registerForm.addEventListener("submit", async e => {
      e.preventDefault();
      hideError("reg-error");
      const email    = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      try {
        const resp = await fetch("/api/v1/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await resp.json();
        if (!resp.ok) { showError("reg-error", data.detail || "Registration failed"); return; }
        // auto-login
        const loginResp = await fetch("/api/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const loginData = await loginResp.json();
        if (loginResp.ok) {
          setToken(loginData.access_token);
          if (loginData.refresh_token) setRefreshToken(loginData.refresh_token);
          window.location.href = "analyze.html";
        }
      } catch {
        showError("reg-error", "Network error");
      }
    });

    // ── force password change ────────────────────────────────────────────────
    document.getElementById("force-pw-form").addEventListener("submit", async e => {
      e.preventDefault();
      hideError("force-pw-error");
      const current = document.getElementById("force-pw-current").value;
      const newPw   = document.getElementById("force-pw-new").value;
      const confirm = document.getElementById("force-pw-confirm").value;
      if (newPw !== confirm) { showError("force-pw-error", "Passwords do not match"); return; }
      try {
        const resp = await fetch("/api/v1/auth/change-password", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...authHeaders() },
          body: JSON.stringify({ current_password: current, new_password: newPw }),
        });
        if (!resp.ok) {
          const d = await resp.json();
          showError("force-pw-error", d.detail || "Failed to change password");
          return;
        }
        window.location.href = "analyze.html";
      } catch {
        showError("force-pw-error", "Network error");
      }
    });
  </script>
</body>
</html>
